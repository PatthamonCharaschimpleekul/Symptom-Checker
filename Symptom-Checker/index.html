<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTC-8">
    <title>Rule-Based Symptom Checker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="contianer">
    <h1>Symptom Checker</h1>
    <p>Select your symptoms:</p>

<form id="symptomForm">
    <label><input type="checkbox" value="cough"> Cough</label><br>
    <label><input type="checkbox" value="fever"> Fever</label><br>
    <label><input type="checkbox" value="headache"> Headache</label><br>
    <label><input type="checkbox" value="body_aches"> Body Aaches</label><br>
    <label><input type="checkbox" value="fatigue"> Fatigue</label><br>
    <label><input type="checkbox" value="low_grade_faver"> Low grade fever</label><br>
    <label><input type="checkbox" value="Sneezing"> Sneezing</label><br>
    <label><input type="checkbox" value="runny_nose"> Runny Nose</label><br>
    <label><input type="checkbox" value= "sore_throat"> Sore Throat</label><br>
    <label><input type="checkbox" value="shortness_of_breath"> Shortness of Breath</label><br>
    <label><input type="checkbox" value="loss_of_taste_or_smell"> Loss of Taste or Smell</label><br>
    <label><input type="checkbox" value="diarrhea"> Diarrhea</label><br>
    <label><input type="checkbox" value="difficulty_sleeping"> Difficulty Sleeping</label><br>
    <label><input type="checkbox" value="feeling_restless"> Feeling Restless</label><br>
    <label><input type="checkbox" value="nervous_or_tense"> Nervous or Tense</label><br>
    <label><input type="checkbox" value="stomach_problem"> Stomach Problem</label><br>
    <label><input type="checkbox" value="panic"> Panic</label><br>
    <label><input type="checkbox" value="nausea"> Nausea</label><br>
    <label><input type="checkbox" value="sensitive_to_light"> Sensitive to Light</label><br>
    <label><input type="checkbox" value="stuffy_nose"> Stuffy Nose</label><br>
    <label><input type="checkbox" value="feeling_cold_or_sweaty"> Feeling Cold or Sweaty</label><br>
    <br>
    <button type="submit">Check Symptoms</button>
</form>

<div id="result"></div>

<script src="script.js"></script>

</div>
</body>
</html>
